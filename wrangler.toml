name = "giljob-e"
main = "worker/index.ts"
compatibility_date = "2026-04-29"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
DEMO_MODE = "true"

# Real API integration (set via `wrangler secret put`):
#   GEMINI_API_KEY  — Gemini Live API (STT + Vision + LLM + TTS in one stream)
#
# Optional override:
#   GEMINI_LIVE_MODEL  — default `gemini-2.0-flash-live-001`
#
# SpatialReal AvatarKit (3D interviewer avatar):
#   SPATIALREAL_APP_ID         — App ID from Studio dashboard
#   SPATIALREAL_API_KEY        — API Key (reserved for vendor mint endpoint)
#   SPATIALREAL_AVATAR_ID      — Public avatar ID (not secret, but stored as
#                                secret for parity with other vars)
#   SPATIALREAL_SESSION_TOKEN  — Manually-rotated session token (max 1h
#                                validity). Vendor mint endpoint TBD; rotate
#                                via `wrangler secret put` every ~50 minutes.
