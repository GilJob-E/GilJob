name = "giljob-e"
main = "worker/index.ts"
compatibility_date = "2026-04-29"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
DEMO_MODE = "true"

# Real API integration (set via `wrangler secret put`):
#   GEMINI_API_KEY  — Gemini Live API (STT + Vision + LLM + TTS in one stream)
#
# Optional override:
#   GEMINI_LIVE_MODEL  — default `gemini-2.0-flash-live-001`
